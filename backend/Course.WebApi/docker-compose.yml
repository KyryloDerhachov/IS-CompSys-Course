version: '3.8'

services:
  postgres-db:
    image: postgres:16-alpine
    container_name: grocery-store-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: super_secure_password123
      POSTGRES_DB: GroceryStoreDb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4
    container_name: grocery-store-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@store.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "8080:80"
    depends_on:
      - postgres-db
    restart: unless-stopped

volumes:
  postgres_data: